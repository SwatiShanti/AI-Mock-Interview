services:
  # --- Backend Service (on Render) ---
  - type: web
    name: ai-mock-interview-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Provide your MongoDB Atlas URL here
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false # Provide your Vercel frontend URL here
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        value: gpt-4o
      - key: AZURE_OPENAI_API_VERSION
        value: 2024-02-01
