services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ai_mock_interview
      - JWT_SECRET=your_super_secret_jwt_key
      - CLIENT_URL=http://localhost:80
      # - AZURE_OPENAI_ENDPOINT=...
      # - AZURE_OPENAI_API_KEY=...
    depends_on:
      - mongodb

  client:
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongodb_data:
